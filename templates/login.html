<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<div class="container">

    <h2>Login</h2>

    <form id="loginform">

        <input type="email"
               id="email"
               placeholder="Email"
               required>

        <input type="password"
               id="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    <p id="error"></p>

    <a href="/">
        Create account
    </a>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
